# Rate limiting: 10 req/s sostenido, permite ráfagas de hasta 30
limit_req_zone $binary_remote_addr zone=conty_front:10m rate=10r/s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Bloquear rutas usadas por escáneres automatizados
    location ~ /\.env                        { return 404; }
    location ~ /\.git                        { return 404; }
    location ~ /\.aws                        { return 404; }
    location ~ /\.(anthropic|openai|cursor)  { return 404; }
    location = /secrets.json                 { return 404; }
    location = /credentials.json             { return 404; }
    location = /serviceAccountKey.json       { return 404; }

    # Permitir explícitamente .well-known (Let's Encrypt, verificaciones, etc.)
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # Archivos con extensión: si no existen devolvemos 404 (no fallback a index.html)
    location ~* \.(js|mjs|css|png|jpe?g|gif|ico|svg|webp|avif|woff2?|ttf|eot|json|map|txt|xml)$ {
        limit_req zone=conty_front burst=30 nodelay;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Rutas de la SPA: fallback a index.html
    location / {
        limit_req zone=conty_front burst=30 nodelay;
        try_files $uri /index.html;
    }
}
